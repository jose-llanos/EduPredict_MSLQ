version: '3.8'

services:
  api:
    build: .
    container_name: mslq-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
    environment:
      - DEBUG=True
      - HOST=0.0.0.0
      - PORT=8000
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
